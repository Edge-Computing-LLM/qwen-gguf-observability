name: validate

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: python3.11 -m unittest discover -s tests -v
      - run: python3.11 -m py_compile scripts/qwen_observe.py
